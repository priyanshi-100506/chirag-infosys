<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise Contact Section</title>
<!-- Importing the "Inter" font from Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* Enterprise Typography and Styling */
  .contact-section {
    font-family: 'Inter', sans-serif;
    color: #333333;
    max-width: 400px;
    padding: 24px;
    border-left: 4px solid #0056b3; /* Sleek corporate accent line */
    background-color: #fcfcfc;
  }

  .contact-item {
    display: flex;
    align-items: center;
    margin-bottom: 16px;
    font-size: 15px;
  }

  .contact-item:last-child {
    margin-bottom: 0;
  }

  .contact-label {
    font-weight: 600;
    color: #666666;
    width: 30px; /* Ensures perfect vertical alignment */
  }

  .contact-link {
    color: #1a1a1a;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s ease;
  }

  .contact-link:hover {
    color: #0056b3; /* Subtle hover effect */
  }
</style>
</head>
<body>

<div class="contact-section">
  <div class="contact-item">
    <span class="contact-label">T.</span>
    <a href="tel:+919825358858" class="contact-link">+91 98253 58858</a>
  </div>
  
  <div class="contact-item">
    <span class="contact-label">E.</span>
    <a href="mailto:chiragin@hotmail.com" class="contact-link">chiragin@hotmail.com</a>
  </div>

  <div class="contact-item">
    <span class="contact-label">E.</span>
    <a href="mailto:chiraginfos@gmail.com" class="contact-link">chiraginfos@gmail.com</a>
  </div>
</div>

</body>
</html>
